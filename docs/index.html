<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Finance Dashboard</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1e222b; --line: #2a2f3a;
    --text: #e7e9ee; --muted: #9aa3b2; --accent: #4f8cff; --accent-weak: #24304b;
    --pos: #46c08a; --neg: #ef6b7b; --warn: #e0a336;
  }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); font-size: 14px; }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); background: var(--panel); }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  header .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  main { padding: 22px 24px 80px; }
  .muted { color: var(--muted); }
</style>
</head>
<body>
<header style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
  <div>
    <h1>Finance Dashboard</h1>
    <div class="meta" id="meta">Read-only published view</div>
  </div>
  <label class="meta" style="display:inline-flex;align-items:center;gap:8px;">View
    <select id="userSel" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font:inherit;">
      <option value="">Everyone</option>
    </select>
  </label>
</header>
<main><div id="dashRoot"><p class="muted">Loading…</p></div></main>

<script type="module">
  import { renderDashboard } from "./shared/dashboard-render.js";
  (async function () {
    try {
      const snap = await (await fetch("./data/snapshot.json", { cache: "no-store" })).json();
      if (!snap.version) {
        document.getElementById("dashRoot").innerHTML = '<p class="muted">No data published yet.</p>';
        return;
      }
      const when = snap.published_at ? new Date(snap.published_at).toLocaleString() : "—";
      document.getElementById("meta").textContent = `Version ${snap.version} · updated ${when}${snap.published_by ? " by " + snap.published_by : ""}`;

      const people = snap.people || [];
      const sel = document.getElementById("userSel");
      for (const p of people.filter((x) => !x.deleted_at)) {
        const o = document.createElement("option"); o.value = p.id; o.textContent = p.name; sel.appendChild(o);
      }
      // Remember the viewer's last choice (this is a read-only preference only).
      sel.value = localStorage.getItem("pubView") || "";
      const draw = () => {
        localStorage.setItem("pubView", sel.value);
        renderDashboard(document.getElementById("dashRoot"), {
          people,
          accounts: snap.accounts || [],
          transactions: snap.transactions || [],
          planTargets: snap.plan_targets || [],
          currentUser: sel.value,   // dashboard is user-specific; no onEditPlan → read-only
        });
      };
      sel.addEventListener("change", draw);
      draw();
    } catch (e) {
      document.getElementById("dashRoot").innerHTML = `<p class="muted">Could not load snapshot: ${e.message}</p>`;
    }
  })();
</script>
</body>
</html>
